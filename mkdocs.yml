site_name: Nutrition API — Documentation
site_description: Documentation technique du projet Nutrition API
site_author: Maxime Ghalem
docs_dir: pages
site_dir: site

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: fr
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: false
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Accueil: index.md

  - Spécifications:
    - Introduction: backend/1.nutrition-introduction.md
    - Cas d'usage: backend/2.nutrition-cas-usage.md
    - Specs fonctionnelles: backend/3.nutrition-specifications-fonctionnelles.md
    - Specs techniques: backend/4.nutrition-specifications-techniques.md
    - Contraintes: backend/5.nutrition-contraintes.md
    - Abonnements: backend/6.nutrition-abonnements.md
    - Administration: backend/7.nutrition-admin.md

  - Domaine:
    - Modèle domaine: backend/design/design-domain.md
    - Règles métier: backend/design/Regles-metier.md
    - Diagramme de classes: backend/annexes/Diagramme-classes.md

  - Design:
    - Domain Layer: backend/design/design-domain.md
    - Application Layer: backend/design/design-application.md
    - Infrastructure Layer: backend/design/design-infrastructure.md
    - API Layer: backend/design/design-api.md

  - Features:
    - Vue d'ensemble: backend/features/README.md
    - Authentification: backend/features/authentification.md
    - Profil utilisateur: backend/features/profil-utilisateur.md
    - Diet Plan: backend/features/diet-plan.md
    - Diet: backend/features/diet.md
    - Repas: backend/features/repas.md
    - Aliments: backend/features/aliments.md
    - Bilan nutritionnel: backend/features/bilan-nutritionnel.md
    - Suivi du poids: backend/features/suivi-poids.md
    - RGPD: backend/features/rgpd.md
    - OpenAPI: backend/features/openapi.md
    - Abonnements: backend/features/abonnements.md
    - Admin dashboard: backend/features/admin-dashboard.md

  - Infrastructure:
    - Setup: backend/annexes/infrastructure-setup.md
    - Keycloak Admin: backend/annexes/infrastructure-keycloak-admin.md
    - Import Open Food Facts: backend/annexes/infrastructure-import-off.md
    - Hangfire: backend/annexes/infrastructure-hangfire.md
    - Publication docs: backend/annexes/infrastructure-docs.md
    - Workflows: backend/annexes/workflows.md
